<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <title>The Shop</title> 
</head> 
<body> 
 
  <!-- Header --> 
  <header id="main-header">The Shop</header> 
 
  <!-- Body section --> 
  <section id="main-body"> 
    <h2>Featured Products</h2> 
 
    <!-- Image placeholder --> 
    <div class="carousel-container"> 
      <div class="carousel-slide"> 
        <img src="https://via.placeholder.com/300x200?text=Product+1" 
alt="Product 1" class="slide-img"> 
        <img src="https://via.placeholder.com/300x200?text=Product+2" 
alt="Product 2" class="slide-img"> 
      </div> 
      <!-- Navigation dots --> 
      <div class="dots"> 
        <span class="dot active"></span> 
        <span class="dot"></span> 
      </div> 
    </div> 
  </section> 
 
  <!-- Footer --> 
  <footer id="main-footer">End Shop</footer> 
 
</body> 
</html>
